version: "3.9"
services:
  backend:
    image: todo-backend
    build:
      context: ./backend
    container_name: backend
    expose:
      - "5000"

  frontend:
    image: nginx
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
