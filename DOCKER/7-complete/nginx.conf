server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    sendfile off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /todos {
        proxy_pass http://backend:5000/todos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
